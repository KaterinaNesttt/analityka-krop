<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" role="img" aria-label="Користувачі">

<defs>
  <linearGradient id="edge" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".96"/>
    <stop offset=".42" stop-color="#BFD9FF" stop-opacity=".76"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity=".28"/>
  </linearGradient>
  <linearGradient id="glass" x1="14" y1="10" x2="50" y2="58" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".40"/>
    <stop offset=".48" stop-color="#9FC6FF" stop-opacity=".13"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity=".04"/>
  </linearGradient>
  <linearGradient id="shine" x1="16" y1="6" x2="48" y2="32" gradientUnits="userSpaceOnUse">
    <stop stop-color="#FFFFFF" stop-opacity=".75"/>
    <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
    <feDropShadow dx="0" dy="0" stdDeviation="1.8" flood-color="#DCEEFF" flood-opacity=".55"/>
    <feDropShadow dx="0" dy="2" stdDeviation="3.2" flood-color="#06111E" flood-opacity=".45"/>
  </filter>
  <filter id="tinyGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feDropShadow dx="0" dy="0" stdDeviation="1.1" flood-color="#FFFFFF" flood-opacity=".52"/>
  </filter>
</defs>

<g filter="url(#softGlow)" stroke="url(#edge)" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round">

  <circle cx="25.5" cy="25" r="7.1" fill="url(#glass)"/>
  <circle cx="41" cy="27.8" r="5.9" fill="url(#glass)" opacity=".78"/>
  <path d="M12.5 49c2.2-8.2 7.6-12.2 13-12.2 5.9 0 10.4 3.4 12.7 9.4" fill="url(#glass)"/>
  <path d="M34.5 45.9c2.2-5.3 5.8-7.9 9.6-7.2 3.6.6 6.2 3.3 7.4 8" opacity=".78"/>
  <path d="M20 18.6c3-2.5 7.7-2.9 11-.4" stroke="url(#shine)" opacity=".68"/>

</g>
</svg>