name = "analityka-krop-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------

# 2. Прогоніть міграції:
#    wrangler d1 migrations apply anal --remote
# 3. Задайте секрети:
#    wrangler secret put JWT_SECRET
#    wrangler secret put JWT_REFRESH_SECRET
#    wrangler secret put ADMIN_BOOTSTRAP_EMAIL
#    wrangler secret put ADMIN_BOOTSTRAP_PASSWORD
# 4. Деплой:
#    wrangler deploy
# ---------------------------------------------------------------

[[d1_databases]]
binding = "DB"
database_name = "anal"
database_id = "ecc0b259-038d-4641-9c68-a7d934d89ac8"
migrations_dir = "migrations"

[vars]
# Дозволений origin фронтенду (поставте URL Pages після деплою)
ALLOWED_ORIGIN = "*"
